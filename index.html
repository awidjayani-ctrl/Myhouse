<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHouse - Premium Real Estate Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f4f6fa; --bg-card: #ffffff; --primary: #0f172a; 
            --accent: #ff6e21; --border: #e2e8f0; --text-main: #1e293b; --text-muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px; color: var(--text-main); }

        .main-container {
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; width: 100%; max-width: 1150px;
            background: var(--bg-card); border-radius: 24px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
            border: 1px solid var(--border); overflow: hidden; padding: 35px;
        }
        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; padding: 20px; } }

        .form-section { display: flex; flex-direction: column; justify-content: space-between; }
        .brand h1 { font-size: 32px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .brand h1 span { color: var(--accent); }
        .brand p { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; margin-top: 5px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--primary); text-transform: uppercase; }
        
        .input-icon-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon-wrapper i { position: absolute; left: 14px; color: var(--text-muted); font-size: 14px; }
        .input-icon-wrapper input { width: 100%; padding: 12px 14px 12px 40px; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; color: var(--text-main); font-size: 14px; }
        .input-icon-wrapper input:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(255, 110, 33, 0.15); }

        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-submit:hover { background: var(--accent); transform: translateY(-1px); }

        /* Panel Kanan Galeri */
        .visual-section { background: #f8fafc; border-radius: 18px; border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; justify-content: center; min-height: 480px; }
        .visual-tabs { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; }
        
        .tab-btn { background: none; border: none; font-size: 12px; font-weight: 600; color: var(--text-muted); padding: 6px 12px; border-radius: 6px; display: inline-flex; align-items: center; gap: 6px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .gallery-nav { display: flex; gap: 8px; }
        .nav-arrow { background: #e2e8f0; border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary); transition: 0.2s; }
        .nav-arrow:hover { background: var(--accent); color: white; }

        .canvas-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; height: 340px; border-radius: 12px; overflow: hidden; }
        .blueprint-title { position: absolute; top: 15px; left: 15px; font-size: 11px; font-weight: 700; color: #fff; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 20px; z-index: 10; letter-spacing: 0.5px; }
        
        .real-house-img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; transition: 0.4s ease-in-out; }

        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .dot { width: 10px; height: 10px; background: #cbd5e1; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .dot.active { background: var(--accent); width: 24px; border-radius: 10px; }

        .result-panel { margin-top: 25px; padding: 20px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 14px; color: #fff; text-align: center; display: none; }
        .result-panel span { font-size: 11px; color: #94a3b8; text-transform: uppercase; display: block; }
        .result-panel h2 { font-size: 30px; color: var(--accent); font-weight: 700; margin-bottom: 12px; }
        
        .action-buttons { display: flex; gap: 10px; justify-content: center; }
        .btn-action { padding: 8px 16px; font-size: 11px; font-weight: 600; border-radius: 6px; text-decoration: none; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .btn-wa { background: #25d366; color: white; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="form-section">
        <div class="brand">
            <h1><i class="fa-solid fa-house-chimney" style="color: var(--accent); font-size: 26px;"></i> MyHouse<span>!</span></h1>
            <p>Masukkan spesifikasi unit untuk melihat klaster denah bangunan & kalkulasi harga pasaran.</p>
        </div>

        <form id="predictionForm" onsubmit="hitungPrediksi(event)">
            <div class="form-group">
                <label>Luas Rumah Atas Tanah (SqFt)</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-ruler-combined"></i>
                    <input type="number" id="gr_liv_area" placeholder="Contoh: 1500" oninput="updateKlasterRumah()" required>
                </div>
            </div>
            <div class="form-group">
                <label>Kamar Tidur (Maks 8)</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-bed"></i>
                    <input type="number" id="bedroom" min="1" max="8" placeholder="Jumlah kamar tidur" oninput="updateKlasterRumah()" required>
                </div>
            </div>
            <div class="form-group">
                <label>Tahun Konstruksi</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-calendar-days"></i>
                    <input type="number" id="year_built" min="1700" max="2026" placeholder="Tahun selesai bangun" required>
                </div>
            </div>
            <div class="form-group">
                <label>Skala Kualitas Material (1 - 10)</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-gem"></i>
                    <input type="number" id="overall_qual" min="1" max="10" placeholder="Ketik angka 1 - 10" required>
                </div>
            </div>
            <button type="submit" class="btn-submit">Hitung Kalkulasi Nilai</button>
        </form>

        <div class="result-panel" id="resultBox">
            <span>Estimasi Nilai Properti Pasaran</span>
            <h2 id="predictionText">Rp 0</h2>
            <div class="action-buttons">
                <a href="https://wa.me/628123456789?text=Halo%20MyHouse,%20saya%20tertarik%20dengan%20unit%20ini" target="_blank" class="btn-action btn-wa"><i class="fa-brands fa-whatsapp"></i> Hubungi Agen via WA</a>
            </div>
        </div>
    </div>

    <div class="visual-section">
        <div class="visual-tabs">
            <div class="tab-btn active"><i class="fa-solid fa-images"></i> VISUALISASI KLASTER</div>
            <div class="gallery-nav">
                <button class="nav-arrow" onclick="geserGambar(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="nav-arrow" onclick="geserGambar(1)"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="canvas-container">
            <div class="blueprint-title" id="canvasTitle">KLASTER MINIMALIS (1/2)</div>
            <img src="static/images/minimalis1.jpg" class="real-house-img" id="houseImage" alt="Visual Properti">
        </div>

        <div class="dots-container" id="dotsWrapper"></div>
    </div>
</div>

<script>
const folderPath = "static/images/";

// Database Dinamis Sesuai Target Berkas Pilihanmu
const databaseKlaster = {
    minimalis: [
        { src: "minimalis1.jpg", label: "KLASTER MINIMALIS - DESIGN A" },
        { src: "minimalis2.jpg", label: "KLASTER MINIMALIS - DESIGN B" }
    ],
    modern: [
        { src: "modern1.jpg", label: "KLASTER MODERN - TYPE ALPHA" },
        { src: "modern2.jpg", label: "KLASTER MODERN - TYPE BETA" },
        { src: "modern3.jpg", label: "KLASTER MODERN - TYPE OMEGA" }
    ],
    luxury: [
        { src: "luxury1.jpg", label: "KLASTER LUXURY - MANSION A" },
        { src: "luxury2.jpg", label: "KLASTER LUXURY - MANSION B" }
    ]
};

let currentKlaster = "minimalis"; 
let currentIndexImage = 0;        

function updateKlasterRumah() {
    const area = parseInt(document.getElementById('gr_liv_area').value) || 0;
    const bed = parseInt(document.getElementById('bedroom').value) || 0;
    
    let klasterBaru = "minimalis";

    if (area > 2200 || bed >= 5) {
        klasterBaru = "luxury";
    } else if ((area >= 1200 && area <= 2200) && (bed >= 3 && bed <= 4)) {
        klasterBaru = "modern";
    } else {
        klasterBaru = "minimalis";
    }

    if (klasterBaru !== currentKlaster) {
        currentKlaster = klasterBaru;
        currentIndexImage = 0; 
    }

    renderVisual();
}

function renderVisual() {
    const listGambar = databaseKlaster[currentKlaster];
    const totalGambar = listGambar.length;
    const dataAktif = listGambar[currentIndexImage];

    document.getElementById('houseImage').src = folderPath + dataAktif.src;
    document.getElementById('canvasTitle').innerText = `${dataAktif.label} (${currentIndexImage + 1}/${totalGambar})`;

    // Render Bulatan Dots Secara Otomatis Sesuai Panjang Array Klaster Terpilih
    const dotsWrapper = document.getElementById('dotsWrapper');
    dotsWrapper.innerHTML = "";
    for(let i = 0; i < totalGambar; i++) {
        const dot = document.createElement('span');
        dot.className = "dot" + (i === currentIndexImage ? " active" : "");
        dot.onclick = function() { setGambarDirect(i); };
        dotsWrapper.appendChild(dot);
    }
}

function geserGambar(arah) {
    const totalGambar = databaseKlaster[currentKlaster].length;
    currentIndexImage += arah;
    if (currentIndexImage >= totalGambar) currentIndexImage = 0;
    if (currentIndexImage < 0) currentIndexImage = totalGambar - 1;
    renderVisual();
}

function setGambarDirect(index) {
    currentIndexImage = index;
    renderVisual();
}

// Inisialisasi awal dots indikator saat halaman pertama dimuat
renderVisual();

function hitungPrediksi(event) {
    event.preventDefault();
    const grLivArea = parseFloat(document.getElementById('gr_liv_area').value);
    const bedroom = parseFloat(document.getElementById('bedroom').value);
    const yearBuilt = parseFloat(document.getElementById('year_built').value);
    const overallQual = parseFloat(document.getElementById('overall_qual').value);

    const intercept = -999741.9938;
    let priceUSD = intercept + (74.4466353 * grLivArea) + (3500.00 * bedroom) + (486.2285525 * yearBuilt) + (23265.36892 * overallQual);
    
    if (priceUSD < grLivArea * 10) priceUSD = grLivArea * 1350; 

    const priceIDR = Math.round(priceUSD * 15500);
    document.getElementById('resultBox').style.display = 'block';

    let start = 0;
    const duration = 1000;
    const obj = document.getElementById('predictionText');
    const startTime = performance.now();

    function step(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const current = Math.floor(progress * (priceIDR - start) + start);
        obj.innerText = current.toLocaleString('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
        if (progress < 1) window.requestAnimationFrame(step);
    }
    window.requestAnimationFrame(step);
}
</script>
</body>
</html>
